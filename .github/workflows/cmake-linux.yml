name: CMake Linux CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Debug
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cpp_comp: g++
            c_comp: gcc
          - compiler: clang
            cpp_comp: clang++
            c_comp: clang

    steps:
    - uses: actions/checkout@v4

    - name: Install Toolchain and Analysis Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential llvm clang clang-tidy cppcheck cmake libstdc++-12-dev lcov

    - name: Run Cppcheck
      run: |
        cppcheck --enable=all \
        --error-exitcode=1 \
        --inline-suppr \
        --std=c++20 \
        --suppress=syntaxError:tests/ \
        --suppress=missingIncludeSystem \
        --suppress=missingInclude \
        --suppress=unmatchedSuppression \
        -I include/ \
        .

    - name: Configure CMake
      run: >
        cmake -B build
        -DCMAKE_CXX_COMPILER=${{matrix.cpp_comp}}
        -DCMAKE_C_COMPILER=${{matrix.c_comp}}
        -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        -DENABLE_SANITIZERS=ON
        -DENABLE_COVERAGE=ON

    - name: Run Clang-Tidy
      run: |
        find . -name "*.cpp" -o -name "*.c" | grep -v "build/" | xargs clang-tidy -p build/ --warnings-as-errors='*'

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}}

    - name: Run Tests (Logic + ASan + UBSan)
      working-directory: build
      run: ctest --output-on-failure

    - name: Generate Coverage Report
      if: matrix.compiler == 'gcc'
      run: |
        lcov --directory . --capture --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/build/_deps/*' '*/tests/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload to Codecov
      if: matrix.compiler == 'gcc'
      uses: codecov/codecov-action@v4
      with:
        files: coverage.info
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: true
